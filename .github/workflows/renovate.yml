name: Renovate Security Patches

on:
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 04:00 UTC
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Run Renovate
        uses: renovatebot/github-action@v41
        env:
          # Use a PAT stored as RENOVATE_TOKEN secret for full PR creation access.
          # GITHUB_TOKEN works but cannot trigger downstream workflows on created PRs.
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
          # Run Renovate as Node.js process — no Docker required.
          RENOVATE_BINARY_SOURCE: install
          LOG_LEVEL: warn
