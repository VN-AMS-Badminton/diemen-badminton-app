# Fly.io app config — Diemen Badminton
# Docs: https://fly.io/docs/reference/configuration/
#
# After cloning: replace `app` below with the name returned by `fly apps create`.

app = "diemen-badminton"
primary_region = "ams"

[build]

# NEXT_PUBLIC_* args MUST be supplied per-deploy with `--build-arg`
# (values aren't committed). Lists them here so Fly's remote builder
# forwards them to the Docker BuildKit stage.
[build.args]
  NEXT_PUBLIC_SUPABASE_URL = ""
  NEXT_PUBLIC_SUPABASE_ANON_KEY = ""
  NEXT_PUBLIC_APP_URL = ""

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Scale to zero when idle, wake on first request (~300ms).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
