# fly.toml app configuration file generated for diemen-badminton-app on 2026-05-14T18:19:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'diemen-badminton-app'
primary_region = 'ams'

[build]

# NEXT_PUBLIC_* args MUST be supplied per-deploy with `--build-arg`
# (values aren't committed). Lists them here so Fly's remote builder
# forwards them to the Docker BuildKit stage.
[build.args]
  NEXT_PUBLIC_SUPABASE_URL = ""
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = ""
  NEXT_PUBLIC_APP_URL = ""

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
